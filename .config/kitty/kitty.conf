# Theme
include nord.conf
# include ~/.config/nvim/bundle/tokyonight.nvim/extras/kitty_tokyonight_storm.conf

# Font
font_family      Dank Mono
font_size        16
bold_font        auto
italic_font      auto
bold_italic_font auto

# Misc
copy_on_select               yes
close_on_child_death         yes
editor                       .
enable_audio_bell            no
remember_window_size         yes
remember_window_position     yes
scrolllback_lines            0 # leave that to tmux
macos_hide_titlebar          yes
window_padding_width         2.0
macos_traditional_fullscreen yes
macos_thicken_font           1.2

# Keys
macos_option_as_alt yes
